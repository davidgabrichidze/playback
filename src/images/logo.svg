<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <style>
      .bg { fill: none; }
      .ring {
      fill: none;
      stroke: #c49a6c;
      stroke-width: 28px;
      stroke-linecap: round;
      }
      .flow {
      fill: none;
      stroke-width: 30px;
      stroke-linecap: round;
      stroke-linejoin: round;
      }
      .teller {
      fill: #e8dfd0;
      }
      .red { fill: #c85a48; }
      .blue { fill: #5e8aa8; }
      .yellow { fill: #e0a93a; }
      .green { fill: #7a9456; }
      .knot { fill: #e8dfd0; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1200" />

  <!-- Circle (centered in square viewBox) -->
  <circle class="ring" cx="600" cy="600" r="360" />

  <!--
    4 actor nodes on the right side of the circle, top to bottom:
    Red (top), Blue, Yellow, Green (bottom)
    Circle: cx=600, cy=600, r=360
    Angles from center (0° = right, going clockwise):
    Red:    -50°  → (831.4, 324.2)
    Blue:   -15°  → (947.7, 506.8)
    Yellow:  25°  → (926.3, 752.1)
    Green:   55°  → (806.5, 894.9)
  -->

  <!--
    Curves from teller (240, 600):
    Exit order top to bottom: Green, Yellow, Blue, Red
    They cross around x=700, mimicking the eye's focal point / fish spine.
  -->

  <!-- Green: exits TOP from teller, sweeps high, then crosses DOWN to green node (bottom-right) -->
  <path class="flow" stroke="#7a9456"
    d="M 240 600
           C 380 460, 560 440, 700 580
           C 740 620, 770 770, 806.5 894.9" />

  <!-- Yellow: exits upper-mid from teller, crosses down to yellow node -->
  <path class="flow" stroke="#e0a93a"
    d="M 240 600
           C 390 510, 570 500, 700 590
           C 740 610, 820 680, 926.3 752.1" />

  <!-- Blue: exits lower-mid from teller, crosses up to blue node -->
  <path class="flow" stroke="#5e8aa8"
    d="M 240 600
           C 390 690, 570 700, 700 610
           C 740 590, 840 550, 947.7 506.8" />

  <!-- Red: exits BOTTOM from teller, sweeps low, then crosses UP to red node (top-right) -->
  <path class="flow" stroke="#c85a48"
    d="M 240 600
           C 380 740, 560 760, 700 620
           C 730 590, 780 460, 831.4 324.2" />

  <!-- Nodes on top -->
  <circle class="teller" cx="240" cy="600" r="54" />
  <circle class="red" cx="831.4" cy="324.2" r="54" />
  <circle class="blue" cx="947.7" cy="506.8" r="54" />
  <circle class="yellow" cx="926.3" cy="752.1" r="54" />
  <circle class="green" cx="806.5" cy="894.9" r="54" />

  <!-- Central knot — the conductor, cream focal point (parallel to teller) -->
  <circle class="knot" cx="715" cy="600" r="38" />
</svg>
